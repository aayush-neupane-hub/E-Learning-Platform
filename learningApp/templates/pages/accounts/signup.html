{% extends 'layouts/base.html' %}

{% block title %}Signup | LearnHub{% endblock %}

{% block content %}
<section class="container section auth-layout">
    <div class="card auth-card">
        <h1>Create Account</h1>
        <p class="text-muted">Start your personalized learning journey.</p>

        <form class="form-grid" method="post">
            {% csrf_token %}
            <label>Full Name
                <input type="text" name="full_name" placeholder="Your full name" required>
            </label>
            <label>Email
                <input type="email" name="email" placeholder="name@example.com" required>
            </label>
            <label>Role
                <select name="role" required>
                    <option value="Student" selected>Student</option>
                    <option value="Instructor">Instructor</option>
                </select>
            </label>
            <label>Password
                <input type="password" name="password" placeholder="Create password" required>
            </label>
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>

        <p class="text-muted mt-2">Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
</section>
{% endblock %}
